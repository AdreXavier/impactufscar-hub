<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impact Hub UFSCar – Recursos</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo-area">
        <img src="/logo.png" alt="Impact Hub UFSCar" class="logo" />
        <span class="site-title">Impact Hub UFSCar</span>
      </div>
      <nav class="header-nav">
        <a href="/" class="nav-link active">Recursos</a>
        <a href="/admin.html" class="nav-link btn-admin">Área Admin</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <section class="hero">
      <h1>Base de Conhecimento</h1>
      <p>Explore materiais, aulas e ferramentas organizados por categoria.</p>
    </section>

    <div class="filter-bar">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Pesquisar recursos..."
        aria-label="Pesquisar recursos"
      />
      <div class="category-filters" id="categoryFilters">
        <button class="filter-btn active" data-category="">Todos</button>
      </div>
    </div>

    <div id="statusMessage" class="status-message" aria-live="polite"></div>

    <div class="resources-grid" id="resourcesGrid">
      <!-- Preloading state -->
      <div class="loading-state">
        <span class="spinner"></span>
        <span>Carregando recursos...</span>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="currentYear"></span> Impact Hub UFSCar. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
